<div class="db-page">

  <!-- ═══════════════ LAUNCHER ═══════════════ -->
  <div class="db-launcher">

    <div *ngFor="let item of _menuList" class="db-group">

      <!-- Etiqueta de sección -->
      <div class="db-group-label">
        <span>{{ item.name | uppercase }}</span>
      </div>

      <!-- Tiles -->
      <div class="db-tiles">
        <div *ngFor="let itemSub of item.subMenus"
             class="db-tile"
             (click)="changeRoute(itemSub.linkList)">

          <div class="db-tile-icon">
            <img class="db-tile-img"
                 [ngStyle]="{'max-width.px': itemSub.imgDashSize}"
                 [src]="itemSub.imgDash"
                 alt=""/>
          </div>

          <div class="db-tile-body">
            <span class="db-tile-name">{{ itemSub.name }}</span>
            <span class="db-tile-desc" *ngIf="itemSub.description">{{ itemSub.description }}</span>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>
